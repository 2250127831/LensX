target:
  process: c_test

output:
  csv: /tmp/c_test_raw.csv

probes:
  - name: s0
    type: uprobe
    symbol: mark_s0
    stage: 0
    key: arg1
  - name: s1
    type: uprobe
    symbol: mark_s1
    stage: 1
    key: arg1
  - name: s2
    type: uprobe
    symbol: mark_s2
    stage: 2
    key: arg1

matchers:
  - id: by_key
    stages: [0, 1, 2]
    mode: key

reports:
  - name: s0_s1
    from: 0
    to: 1
  - name: s1_s2
    from: 1
    to: 2
  - name: e2e
    from: 0
    to: 2
